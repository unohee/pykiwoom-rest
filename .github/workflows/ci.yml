name: CI Pipeline

on:
  push:
    branches: [main, master, develop, 'feature/**']
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: pip install ruff black bandit[toml]

      - name: Run Ruff
        run: ruff check src/pykiwoom_rest --output-format=github
        continue-on-error: true

      - name: Run Black (check only)
        run: black --check src/pykiwoom_rest
        continue-on-error: true

      - name: Run Bandit (security check)
        run: bandit -r src/pykiwoom_rest -ll -x tests
        continue-on-error: true

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio pytest-mock pytest-timeout

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src/pykiwoom_rest \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=0 \
            --tb=short \
            --timeout=60 \
            -q
        continue-on-error: true
        env:
          ACCOUNT_NO: ${{ secrets.ACCOUNT_NO }}
          KIWOOM_APPKEY: ${{ secrets.KIWOOM_APPKEY }}
          KIWOOM_APPSECRET: ${{ secrets.KIWOOM_APPSECRET }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install mypy types-requests

      - name: Run mypy
        run: mypy src/pykiwoom_rest --ignore-missing-imports
        continue-on-error: true

  loc-gate:
    name: LOC Gate (Max 1200 lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file sizes
        run: |
          max_lines=1200
          failed=0
          for file in $(find src/pykiwoom_rest -name "*.py"); do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt "$max_lines" ]; then
              echo "::warning file=$file::File exceeds $max_lines lines ($lines)"
              failed=1
            fi
          done
          # Warning only, don't fail the build
          exit 0
