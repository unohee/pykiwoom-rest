[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pykiwoom-rest"
version = "2.0.0"
description = "Python wrapper for Kiwoom Securities REST API"
authors = [
    {name = "Your Name", email = "your.email@example.com"}
]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial :: Investment",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
keywords = ["kiwoom", "korea", "stock", "trading", "api", "rest", "securities"]
dependencies = [
    "requests>=2.28.0",
    "python-dotenv>=0.19.0",
    "pandas>=1.5.0",
    "openpyxl>=3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=3.0.0",
    "black>=22.0.0",
    "flake8>=4.0.0",
    "mypy>=0.900",
]

[project.urls]
Homepage = "https://github.com/yourusername/pykiwoom-rest"
Repository = "https://github.com/yourusername/pykiwoom-rest"
Documentation = "https://github.com/yourusername/pykiwoom-rest#readme"
"Bug Tracker" = "https://github.com/yourusername/pykiwoom-rest/issues"

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["pykiwoom_rest"]

[tool.setuptools.package-data]
pykiwoom_rest = ["*.xlsx", "*.md"]